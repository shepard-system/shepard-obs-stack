# configs/alertmanager/alertmanager.yaml — Shepherd alert routing
global:
  resolve_timeout: 5m

route:
  receiver: 'default'
  group_by: ['alertname', 'source']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - match:
        severity: critical
      receiver: 'notify'
      repeat_interval: 1h

    - match:
        severity: warning
      receiver: 'notify'
      repeat_interval: 4h

receivers:
  - name: 'default'
    # Silently store alerts — visible in Alertmanager UI at :9093

  - name: 'notify'
    # ── Telegram (native) ──────────────────────────────────────
    # 1. Create bot: message @BotFather on Telegram → /newbot
    # 2. Get chat_id: add bot to group, send message, then:
    #    curl -s https://api.telegram.org/bot<TOKEN>/getUpdates | jq '.result[0].message.chat.id'
    # 3. Uncomment below, fill in bot_token and chat_id, restart:
    #    docker compose restart alertmanager
    #
    # telegram_configs:
    #   - bot_token: 'YOUR_BOT_TOKEN'
    #     chat_id: YOUR_CHAT_ID
    #     send_resolved: true
    #     parse_mode: 'HTML'
    #     message: '{{ if eq .Status "firing" }}🔴 <b>{{ .Status | toUpper }}</b>{{ else }}✅ <b>{{ .Status | toUpper }}</b>{{ end }}
    #       {{ range .Alerts }}
    #       <b>{{ .Labels.alertname }}</b> ({{ .Labels.severity }})
    #       {{ .Annotations.summary }}
    #       {{ if eq .Status "firing" }}<i>{{ .Annotations.description }}</i>{{ end }}
    #       {{ end }}'

    # ── Slack (native) ─────────────────────────────────────────
    # 1. Create: https://api.slack.com/apps → Incoming Webhooks → Add to channel
    # 2. Uncomment below, replace URL, restart:
    #    docker compose restart alertmanager
    #
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/REPLACE_ME'
    #     channel: '#shepherd-alerts'
    #     send_resolved: true
    #     title: '{{ template "slack.default.title" . }}'
    #     text: >-
    #       {{ range .Alerts }}
    #       *{{ .Labels.alertname }}* ({{ .Labels.severity }})
    #       {{ .Annotations.summary }}
    #       {{ .Annotations.description }}
    #       {{ end }}

    # ── Discord (native, Alertmanager v0.25.0+) ─────────────
    # 1. Server Settings → Integrations → Webhooks → New Webhook
    # 2. Copy webhook URL, uncomment below, restart:
    #    docker compose restart alertmanager
    #
    # discord_configs:
    #   - webhook_url: 'https://discord.com/api/webhooks/REPLACE_ME'
    #     send_resolved: true
    #     title: '{{ if eq .Status "firing" }}🔴 {{ .Status | toUpper }}{{ else }}✅ {{ .Status | toUpper }}{{ end }}'
    #     message: >-
    #       {{ range .Alerts }}
    #       **{{ .Labels.alertname }}** ({{ .Labels.severity }})
    #       {{ .Annotations.summary }}
    #       {{ .Annotations.description }}
    #       {{ end }}

# Inhibit noisy alerts when the whole pipeline is down
inhibit_rules:
  - source_match:
      alertname: 'LokiDown'
    target_match_re:
      alertname: 'LokiRecordingRulesFailing|HighTokenBurn'
    equal: ['cluster']

  - source_match:
      alertname: 'OTelCollectorDown'
    target_match_re:
      alertname: 'NoTelemetryReceived|HighToolErrorRate|HighSessionCost|HighTokenBurn'
    equal: ['cluster']
